<svg width="800" height="1090" viewBox="0 0 800 1090" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.m { font-family: 'Courier New', Courier, monospace; }
.pulse { animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.2;} }
.show { animation: fi 0.5s ease 0.1s both; }
@keyframes fi { from{opacity:0;} to{opacity:1;} }

/* Mask moves RIGHT: starts at x=16 (covering text), slides to x=800 (off screen) */
/* Line 1: 76 chars, ~1.9s */
.m1 { animation: slide 1.9s linear 0.3s both; }
/* Line 2: 82 chars, ~2.1s, starts after line 1 ends = 0.3+1.9 = 2.2s */
.m2 { animation: slide 2.1s linear 2.2s both; }
/* Line 3: 74 chars, ~1.9s, starts after line 2 ends = 2.2+2.1 = 4.3s */
.m3 { animation: slide 1.9s linear 4.3s both; }

@keyframes slide {
  from { x: 16px; }
  to   { x: 810px; }
}
</style>
</defs>

<rect width="800" height="1090" fill="#ffffff"/>

<!-- HEADER -->
<g class="show">
  <rect x="0" y="24" width="192" height="22" fill="#dbeafe"/>
  <rect x="0" y="24" width="5"   height="22" fill="#2563eb"/>
