  <rect x="14" y="585" width="46" height="14" fill="#dbeafe" rx="1"/><text x="17" y="595.5" class="mono" font-size="8" fill="#1d4ed8" letter-spacing="0.5">SERVING</text>
  <rect x="66" y="585" width="50" height="14" fill="#dbeafe" rx="1"/><text x="69" y="595.5" class="mono" font-size="8" fill="#1d4ed8" letter-spacing="0.5">BATCHING</text>
