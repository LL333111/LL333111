  <text x="2" y="116" class="m" font-size="12.5" fill="#64748b">University of Toronto  ·  third year</text>
  <line x1="0" y1="134" x2="790" y2="134" stroke="#dbeafe" stroke-width="1"/>
</g>

<!-- ABOUT BOX -->
<g class="show">
  <rect x="0" y="146" width="790" height="92" fill="#ffffff" stroke="#dbeafe" stroke-width="1"/>
  <rect x="12" y="139" width="72" height="14" fill="#ffffff"/>
  <text x="15" y="150" class="m" font-size="9" fill="#93c5fd" letter-spacing="2">ABOUT.TXT</text>

  <!-- Line 1 — no highlights, plain text -->
  <text x="16" y="172" class="m" font-size="12" fill="#334155">I build ML systems with a background in applied ML and backend development —</text>
  <rect y="152" width="794" height="24" fill="#ffffff" class="m1"/>

  <!-- Line 2 -->
  <text x="16" y="194" class="m" font-size="12" fill="#334155">increasingly drawn to how models are trained, evaluated, and improved in practice.</text>
  <rect y="174" width="794" height="24" fill="#ffffff" class="m2"/>

  <!-- Line 3 -->
  <text x="16" y="216" class="m" font-size="12" fill="#334155">Currently exploring LLM post-training, evaluation, and model optimization.</text>
  <rect y="196" width="794" height="24" fill="#ffffff" class="m3"/>
</g>

