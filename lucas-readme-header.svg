.show { animation: fi 0.5s ease 0.1s both; }
@keyframes fi { from{opacity:0;} to{opacity:1;} }
.m1 { animation: slide 1.9s linear 0.3s both; }
.m2 { animation: slide 2.1s linear 2.2s both; }
.m3 { animation: slide 1.9s linear 4.3s both; }
@keyframes slide { from{x:16px;} to{x:810px;} }
</style>
