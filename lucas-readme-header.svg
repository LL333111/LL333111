  <rect x="72" y="341" width="54" height="14" fill="#dbeafe" rx="1"/><text x="75" y="351.5" class="mono" font-size="8" fill="#1d4ed8" letter-spacing="0.5">RAND FOREST</text>
  <rect x="132" y="341" width="24" height="14" fill="#dbeafe" rx="1"/><text x="135" y="351.5" class="mono" font-size="8" fill="#1d4ed8" letter-spacing="0.5">MLP</text>
  <rect x="162" y="341" width="34" height="14" fill="#dbeafe" rx="1"/><text x="165" y="351.5" class="mono" font-size="8" fill="#1d4ed8" letter-spacing="0.5">TF-IDF</text>

