<svg width="800" height="1060" viewBox="0 0 800 1060" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.mono{font-family:'DM Mono','Courier New',monospace;}
.header-g{animation:slidedown .6s cubic-bezier(.16,1,.3,1) both;}
@keyframes slidedown{from{transform:translateY(-10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.pulse{animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.cursor{animation:cblink .75s steps(1) 0.6s 6 forwards;}
@keyframes cblink{0%,100%{opacity:1;}50%{opacity:0;}}
.type-mask-1{animation:slide1 2.0s steps(38,end) 0.7s forwards;}
@keyframes slide1{from{x:16px;}to{x:820px;}}
.type-mask-2{animation:slide2 1.8s steps(34,end) 2.8s forwards;}
@keyframes slide2{from{x:16px;}to{x:820px;}}
.type-mask-3{animation:slide3 1.4s steps(26,end) 4.7s forwards;}
@keyframes slide3{from{x:16px;}to{x:820px;}}
.f1{opacity:0;animation:fadein .5s ease 0.2s forwards;}
.f2{opacity:0;animation:fadein .5s ease 6.2s forwards;}
.f3{opacity:0;animation:fadein .5s ease 6.5s forwards;}
.f4{opacity:0;animation:fadein .5s ease 6.8s forwards;}
.f5{opacity:0;animation:fadein .5s ease 7.1s forwards;}
@keyframes fadein{to{opacity:1;}}
</style>
</defs>

<rect width="800" height="1060" fill="#f8fafd"/>

<!-- HEADER -->
<g class="header-g">
  <rect x="0" y="22" width="126" height="16" fill="#dbeafe" rx="1"/>
  <rect x="0" y="22" width="5" height="16" fill="#2563eb"/>
  <text x="13" y="33.5" class="mono" font-size="9" fill="#2563eb" letter-spacing="2">CS · MATH · STAT</text>
  <rect x="596" y="20" width="184" height="20" fill="#eff6ff" rx="2" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="610" cy="30" r="3.5" fill="#2563eb" class="pulse"/>
  <text x="621" y="34.5" class="mono" font-size="9.5" fill="#1d4ed8" letter-spacing="0.3">open to opportunities</text>
  <text x="0" y="78" class="mono" font-size="40" fill="#0a0e1a" letter-spacing="-1" font-weight="500">Lucas Liu</text>
  <text x="0" y="102" class="mono" font-size="12" fill="#64748b" letter-spacing="0.3">University of Toronto  ·  third year</text>
</g>

<!-- divider + ABOUT -->
<g class="f1">
  <line x1="0" y1="120" x2="800" y2="120" stroke="#dbeafe" stroke-width="1"/>
  <rect x="0" y="132" width="760" height="94" fill="#ffffff" stroke="#dbeafe" stroke-width="1"/>
  <rect x="12" y="125" width="62" height="13" fill="#f8fafd"/>
  <text x="14" y="135.5" class="mono" font-size="8.5" fill="#93c5fd" letter-spacing="1.5">ABOUT.TXT</text>
  <text x="16" y="154" class="mono" font-size="12" fill="#334155">I build </text>
  <text x="70" y="154" class="mono" font-size="12" fill="#2563eb" font-weight="500">ML systems</text>
  <text x="166" y="154" class="mono" font-size="12" fill="#334155"> with a background in applied ML and backend</text>
  <rect x="16" y="138" width="750" height="20" fill="#ffffff" class="type-mask-1"/>
  <text x="16" y="174" class="mono" font-size="12" fill="#334155">development — increasingly drawn to how models are trained, evaluated,</text>
  <rect x="16" y="158" width="750" height="20" fill="#ffffff" class="type-mask-2"/>
  <text x="16" y="194" class="mono" font-size="12" fill="#334155">and improved. Currently exploring </text>
  <text x="316" y="194" class="mono" font-size="12" fill="#2563eb" font-weight="500">LLM post-training, evaluation, and model optimization.</text>
  <rect x="16" y="178" width="750" height="20" fill="#ffffff" class="type-mask-3"/>
  <rect x="16" y="196" width="2" height="13" fill="#2563eb" class="cursor"/>
</g>

